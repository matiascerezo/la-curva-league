<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Llorómetro - La Curva League</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-tops.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script th:src="@{/js/burbuja-goleadores.js}" defer></script>
    <link rel="shortcut icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: nav}"></nav>

    <div class="main-container full-width">
        <h1 class="titulo-pagina-lloro">😭Llorómetro Fantasy😭</h1>

        <div class="app-navigator">
            <button id="btnPrev" class="nav-btn" onclick="cambiarJornadaLloros(-1)">❮</button>
            <div class="jornada-display" onclick="abrirSelector()">
                <span class="j-small" id="labelTipoVista">JORNADA</span>
                <span class="j-big" id="numJornadaActual" th:text="${numJornadaActual}">J0</span>
            </div>
            <button id="btnSigui" class="nav-btn" onclick="cambiarJornadaLloros(1)">❯</button>
        </div>
    </div>

    <div class="table-wrapper">
        <div th:each="jornadaEntry : ${mapaLlorosJornadas}" 
            th:id="'jornada-goles-' + ${jornadaEntry.key}" 
            class="bloque-jornada-goles" 
            th:style="${jornadaEntry.key == numJornadaActual} ? 'display: block;' : 'display: none;'">
            
            <table class="styled-table-llorometro">
                <thead>
                    <tr>
                        <th class="col-mister">Mister</th>
                        <th>Motivos del lloro</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="misterEntry : ${jornadaEntry.value}">
                        <td class="mister-nombre">
                            <div class="equipo-info-cell">
                                <img th:src="${misterEntry.value[0].imgEquipo}" class="escudo-tabla">
                                <span th:text="${misterEntry.key}"></span>
                            </div>
                        </td>
                        <td class="col-motivos">
                            <ul class="lista-lloros">
                                <li th:each="l : ${misterEntry.value}">
                                    <span class="icon-lloro">📢</span>
                                    <span th:text="${l.motivo}"></span>
                                </li>
                            </ul>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="selectorJornadaModal" class="modal-selector">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Seleccionar Jornada</h3>
                    <button class="close-btn" onclick="cerrarSelector()">✕</button>
                </div>
                <div class="grid-jornadas">
                    <th:block th:each="j : ${listaJornadas}">
                        <button class="btn-grid" 
                                th:text="${j}" 
                                th:onclick="|irAJornadaDirecta(${j})|"></button>
                    </th:block>
                </div>
            </div>
        </div>
    <nav th:replace="~{fragments/footer :: footer}"></nav>
</body>
</html>
