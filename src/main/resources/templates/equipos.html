<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="|Información de ${nombreEquipo}|">La Curva League - Evolución</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-equipos.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script th:src="@{/js/colorutils.js}"></script>
    <script th:src="@{/js/burbuja-equipos.js}" defer></script>
    <link rel="shortcut icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>
<body>
    <nav class="navbar" th:replace="~{fragments/navbar :: nav}"></nav>
    
    <div class="main-container-equipos">
        <div class="bloque-escudo-nombre">
            <img th:src="${imgEquipo}" alt="Escudo">
            <h1 class="h1-equipo" th:text="${nombreEquipo}">Mister</h1>
        </div>
        <div class="contenedor-filtros-jornada">
            <button class="burbuja-jornada" onclick="filtrarPorRango(1, 38, this)">Todo</button>
            
            <th:block th:each="i : ${#numbers.sequence(1, 38, 8)}">
                <button class="burbuja-jornada"
                        th:with="fin=${(i + 7 > 38) ? 38 : i + 7}"
                        th:classappend="${jornadaActual >= i && jornadaActual <= fin} ? 'active' : ''"
                        th:onclick="|filtrarPorRango(${i}, ${fin}, this)|"
                        th:text="|J${i}-J${fin}|">
                </button>
            </th:block>
        </div>

        <div class="split-container">
            <div class="tabla-puntos-equipo-scroll">
                <div class="table-wrapper">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>Jornada</th>
                                <th>Puntos</th>
                                <th>Posición</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="e : ${puntosEquipoJornadas}" 
                                th:id="|jornada-bloque-${e.numeroJornada}|" 
                                class="bloque-jornada">
                                <td th:text="|J${e.numeroJornada}|" style="font-weight: bold; color: #1a237e;"></td> 
                                <td th:text="${e.puntosJornada} + ' pts'"></td>
                                <td th:text="${e.posicionJornada == 1 ? '🏆' : 
                                               e.posicionJornada == 2 ? '🥈' : 
                                               e.posicionJornada == 3 ? '🥉' : 
                                               e.posicionJornada}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="chart-column">
                <div class="canvas-wrapper">
                    <canvas id="smoothChart"></canvas>
                </div>
            </div>
        </div>
    </div>

<script th:inline="javascript">
    // --- LÓGICA DEL GRÁFICO ---
    window.myChart = null;
    const ctx = document.getElementById('smoothChart').getContext('2d');
    window.rawData = /*[[${puntosEquipoJornadasGrafica}]]*/ [];
    const labels = rawData.map(d => 'J' + d.numeroJornada);
    const points = rawData.map(d => d.puntosJornada);

    const colorEquipoHex = /*[[${colorEquipo}]]*/ '#6a1b9a';
    const colorConTransparencia = hexaToRGBA(colorEquipoHex, 0.4);
    document.querySelector('.h1-equipo').style.color = colorEquipoHex;

    const gradient = ctx.createLinearGradient(0, 0, 0, 800);
    gradient.addColorStop(0, colorConTransparencia);
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

    window.myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Puntos',
                data: points,
                borderColor: colorEquipoHex,
                borderWidth: 3,
                pointBackgroundColor: colorEquipoHex,
                pointRadius: 6,
                pointHoverRadius: 8,
                tension: 0.4,
                fill: true,
                backgroundColor: gradient
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    enabled: true,
                    displayColors: false,
                    backgroundColor: 'white',
                    titleColor: colorEquipoHex,
                    bodyColor: '#1a237e',
                    titleFont: { size: 14, weight: 'bold' },
                    bodyFont: { size: 12, weight: 'bold' },
                    caretSize: 0,
                    caretPadding: 10,
                    callbacks: {
                        label: function(context) {
                            return 'Puntos: ' + context.parsed.y;
                        }
                    }
                },
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: 60,
                    grid: { drawBorder: false, color: '#f0f0f0' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
</script>

<nav th:replace="~{fragments/footer :: footer}"></nav>
</body>
</html>
