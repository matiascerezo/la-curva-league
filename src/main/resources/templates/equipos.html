<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="|Información de ${nombreEquipo}|">La Curva League - Evolución</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-equipos.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script th:src="@{/js/colorutils.js}"></script>
    <link rel="shortcut icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>
<body>
    <nav class="navbar" th:replace="~{fragments/navbar :: nav}"></nav>
    <div class="main-container">
        <h1 class=equipo-titulo th:text="${nombreEquipo}">Mister</h1>

        <div class="split-container">
            
            <div class="table-column">
                <div class="table-wrapper">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>Jornada</th>
                                <th>Puntos</th>
                                <th>Posición</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="e : ${puntosEquipoJornadas}">
                                <td th:text="|J${e.jornadaId}|" style="font-weight: bold; color: #1a237e;"></td> 
                                <td th:text="${e.puntosJornada} + ' pts'"></td>
                                <td th:text="${e.posicionJornada == 1 ? '🥇' : 
                                               e.posicionJornada == 2 ? '🥈' : 
                                               e.posicionJornada == 3 ? '🥉' : 
                                               e.posicionJornada}">
                                    </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="chart-column">
                <div class="canvas-wrapper">
                    <canvas id="smoothChart"></canvas>
                </div>
            </div>

        </div>
    </div>

<script th:inline="javascript">
    const ctx = document.getElementById('smoothChart').getContext('2d');
    
    // Extraemos datos del modelo
    const rawData = /*[[${puntosEquipoJornadas}]]*/ [];
    const labels = rawData.map(d => 'J' + d.jornadaId);
    const points = rawData.map(d => d.puntosJornada);

    const colorEquipoHex = /*[[${colorEquipo}]]*/ '#6a1b9a';
    const colorConTransparencia = hexaToRGBA(colorEquipoHex, 0.4);

    // Creamos un degradado para el fondo
    const gradient = ctx.createLinearGradient(0, 0, 0, 800);
    gradient.addColorStop(0, colorConTransparencia);
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Puntos',
                data: points,
                borderColor: colorEquipoHex,
                borderWidth: 3,
                pointBackgroundColor: colorEquipoHex,
                pointRadius: 6,
                pointHoverRadius: 8,
                tension: 0.4,
                fill: true,
                backgroundColor: gradient
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    enabled: true,
                    displayColors: false, // Quita el cuadradito de color
                    backgroundColor: 'white', // Hace el cuadrado invisible
                    titleColor: colorEquipoHex, // Color lila para el título (Jornada X)
                    bodyColor: '#1a237e',  // Color azul oscuro para el valor (Puntos: X)
                    titleFont: { size: 14, weight: 'bold' },
                    bodyFont: { size: 12, weight: 'bold' },
                    caretSize: 0,          // Quita la flechita del cuadro
                    caretPadding: 10,      // Separación del punto
                    callbacks: {
                        // Personalizamos el texto para que quede limpio
                        label: function(context) {
                            return 'Puntos: ' + context.parsed.y;
                        }
                    }
                },
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { drawBorder: false, color: '#f0f0f0' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
</script>
</body>
<nav th:replace="~{fragments/footer :: footer}"></nav>
</html>
