<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clasificación General</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>
<body>
<div class="main-container-equipos">
    <h1 class= "h1-class-gen" style="text-align: center;" th:text="|Clasificación (J${jornadaActual}/J38)|"> Clasificación (0/38)</h1>
    <div class="table-wrapper">
    <table class="tabla-clasificacion">
        <thead>
            <tr>
                <th>Posición</th>
                <th>Equipo</th>
                <th>Puntos Totales</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="equipo, iter : ${listaEquipos}">
                <td th:text="${iter.count > 3 ? iter.count : ''}">1</td>
                <td>
                    <div class="equipo-info-cell">
                        <img th:src="${equipo.imgEquipo}" 
                            alt="Escudo" 
                            class="escudo-tabla">
                        
                        <span th:text="${equipo.nombreEquipo}" 
                            class="nombre-equipo-tabla"></span>
                    </div>
                </td>
                <td th:text="${equipo.puntosTotales} + ' pts'">0 pts</td>
            </tr>
        </tbody>
    </table>
    </div>
</div>
</body>
<nav th:replace="~{fragments/navbar :: nav}"></nav>
<nav th:replace="~{fragments/footer :: footer}"></nav>
</html>
